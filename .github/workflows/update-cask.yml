name: Update Cask

on:
  workflow_dispatch:
  repository_dispatch:
    types: [update-cask]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest release
        id: release
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/Harry-kp/afk/releases/latest)
          VERSION=$(echo "$RELEASE" | jq -r '.tag_name | sub("^v"; "")')
          DMG_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url')
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "DMG_URL=$DMG_URL" >> $GITHUB_OUTPUT
          
          curl -L -o /tmp/app.dmg "$DMG_URL"
          SHA256=$(shasum -a 256 /tmp/app.dmg | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update cask file
        run: |
          VERSION="${{ steps.release.outputs.VERSION }}"
          SHA256="${{ steps.release.outputs.SHA256 }}"
          
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/afk.rb
          sed -i "s/sha256 .*/sha256 \"$SHA256\"/" Casks/afk.rb
          
          echo "Updated Casks/afk.rb:"
          cat Casks/afk.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/afk.rb
          git commit -m "chore: bump afk to v${{ steps.release.outputs.VERSION }}" || exit 0
          git push
